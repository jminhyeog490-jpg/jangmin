<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
            font-family: Arial, sans-serif;
        }
        .login-container {
            background-color: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 300px;
        }
        .login-container h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #333;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #666;
        }
        .form-group input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box; /* padding 포함 너비 계산 */
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 1rem;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>로그인</h2>
    <div class="form-group">
        <label for="username">아이디</label>
        <input type="text" id="username" placeholder="아이디를 입력하세요">
    </div>
    <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" placeholder="비밀번호를 입력하세요">
    </div>
    <button onclick="login()">로그인</button>
</div>

<script>
    function login() {
        const username = $('#username').val();
        const password = $('#password').val();

        if (!username || !password) {
            alert("아이디와 비밀번호를 모두 입력해주세요.");
            return;
        }

        const data = {
            username: username,
            password: password
        };

        $.ajax({
            type: 'POST',
            url: '/api/auth/login',
            contentType: 'application/json',
            data: JSON.stringify(data),
            success: function (response) {
                // 로그인 성공 시 토큰 저장
                // response 구조: { grantType: "Bearer ", accessToken: "...", refreshToken: "...", ... }

                const accessToken = response.grantType + response.accessToken;
                const refreshToken = response.grantType + response.refreshToken;

                localStorage.setItem('Authorization', accessToken);
                localStorage.setItem('RefreshToken', refreshToken);

                alert("로그인 성공!");
                console.log("Access Token:", accessToken);
                console.log("Refresh Token:", refreshToken);

                // 로그인 후 이동할 페이지가 있다면 아래 주석 해제
                // window.location.href = '/index.html';
            },
            error: function (xhr) {
                console.error(xhr);
                if (xhr.status === 401 || xhr.status === 400) {
                    alert("아이디 또는 비밀번호가 일치하지 않습니다.");
                } else {
                    alert("로그인 중 오류가 발생했습니다.");
                }
            }
        });
    }
</script>

</body>
</html>
