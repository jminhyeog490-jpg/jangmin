<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>채팅방 테스트</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; display: flex; gap: 20px; }
        .section { border: 1px solid #ccc; padding: 15px; border-radius: 5px; width: 45%; }
        #room-list li { cursor: pointer; padding: 5px; border-bottom: 1px solid #eee; }
        #room-list li:hover { background-color: #f0f0f0; }
        #chat-box { height: 300px; border: 1px solid #ddd; overflow-y: scroll; margin-bottom: 10px; padding: 10px; background: #f9f9f9; }
        .message { margin-bottom: 5px; }
        .my-msg { text-align: right; color: blue; }
        .other-msg { text-align: left; color: black; }
    </style>
</head>
<body>

<!-- 왼쪽: 방 목록 및 생성 -->
<div class="section">
    <h3>채팅방 목록</h3>
    <div>
        <input type="text" id="roomTitleInput" placeholder="방 제목 입력">
        <button onclick="createRoom()">방 만들기</button>
    </div>
    <ul id="room-list">
        <!-- 방 목록이 여기에 표시됨 -->
    </ul>
    <button onclick="loadRooms()">목록 새로고침</button>
</div>

<!-- 오른쪽: 채팅 화면 -->
<div class="section">
    <h3 id="current-room-title">채팅방을 선택하세요</h3>
    <div id="chat-box"></div>

    <input type="text" id="messageInput" placeholder="메시지 입력" disabled onkeypress="if(event.keyCode==13) sendMessage()">
    <button id="sendBtn" onclick="sendMessage()" disabled>전송</button>
</div>

<script>
    var stompClient = null;
    var currentRoomId = null;
    var currentSubscription = null;

    // 1. 초기화: 방 목록 불러오기
    $(document).ready(function() {
        loadRooms();
        connectWebSocket();
    });

    // 2. 방 목록 조회 API 호출
    function loadRooms() {
        $.get("/api/chat/rooms", function(rooms) {
            $("#room-list").empty();
            rooms.forEach(function(room) {
                $("#room-list").append(
                    `<li onclick="enterRoom(${room.id}, '${room.title}')">
                        [${room.id}] ${room.title} (방장: ${room.creatorName})
                    </li>`
                );
            });
        });
    }

    // 3. 방 생성 API 호출
    function createRoom() {
        var title = $("#roomTitleInput").val();
        if (!title) return alert("방 제목을 입력하세요.");

        $.ajax({
            url: "/api/chat/rooms",
            type: "POST",
            contentType: "text/plain", // 컨트롤러가 String을 받으므로
            data: title,
            success: function(room) {
                alert("방이 생성되었습니다: " + room.title);
                $("#roomTitleInput").val("");
                loadRooms();
            },
            error: function(err) {
                alert("방 생성 실패 (로그인 필요)");
                console.error(err);
            }
        });
    }

    // 4. 웹소켓 연결
    function connectWebSocket() {
        var socket = new SockJS('/ws-chat');
        stompClient = Stomp.over(socket);
        stompClient.connect({}, function (frame) {
            console.log('Connected: ' + frame);
        });
    }

    // 5. 방 입장 (구독 시작)
    function enterRoom(roomId, title) {
        if (currentSubscription) {
            currentSubscription.unsubscribe(); // 이전 방 구독 취소
        }

        currentRoomId = roomId;
        $("#current-room-title").text("현재 방: " + title);
        $("#chat-box").empty();
        $("#messageInput").prop("disabled", false);
        $("#sendBtn").prop("disabled", false);

        // API로 입장 처리 (멤버 등록)
        $.post(`/api/chat/rooms/${roomId}/enter`);

        // STOMP 구독
        currentSubscription = stompClient.subscribe('/sub/chat/room/' + roomId, function (message) {
            showMessage(JSON.parse(message.body));
        });

        // (선택) 기존 채팅 내역 불러오기 API가 있다면 여기서 호출
    }

    // 6. 메시지 전송
    function sendMessage() {
        var content = $("#messageInput").val();
        if (!content.trim()) return;

        if (stompClient && currentRoomId) {
            var chatMessage = {
                roomId: currentRoomId,
                content: content
            };
            stompClient.send("/pub/chat/message", {}, JSON.stringify(chatMessage));
            $("#messageInput").val('');
        }
    }

    // 7. 메시지 화면 표시
    function showMessage(message) {
        var chatBox = $("#chat-box");
        var msgHtml = `<div class="message">
                        <strong>${message.senderName}:</strong> ${message.content}
                       </div>`;
        chatBox.append(msgHtml);
        chatBox.scrollTop(chatBox[0].scrollHeight);
    }
</script>

</body>
</html>
